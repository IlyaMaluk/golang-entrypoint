name: Go Tests CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Unit and Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: school_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d school_db"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Run Migrations
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate
          migrate -path migrations -database "postgres://user:password@localhost:5432/school_db?sslmode=disable" up

      - name: Run Tests
        env:
          DB_DSN: "postgres://user:password@localhost:5432/school_db?sslmode=disable"
        run: go test -v ./...